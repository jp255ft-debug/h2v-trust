services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: h2v_timescaledb_prod
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-h2v_trust}
    ports:
      - "5432:5432"
    volumes:
      - timescale_data_prod:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-h2v_trust}"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: h2v_redis_prod
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: h2v_backend_prod
    environment:
      DATABASE_URL: postgresql://${DB_USER:-user}:${DB_PASSWORD:-password}@timescaledb:5432/${DB_NAME:-h2v_trust}
      REDIS_URL: redis://redis:6379
      POLYGON_RPC_URL: ${POLYGON_RPC_URL}
      PRIVATE_KEY: ${PRIVATE_KEY}
      CONTRACT_ADDRESS: ${CONTRACT_ADDRESS}
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:3000}
      API_RATE_LIMIT: ${API_RATE_LIMIT:-1000}
      MOCK_MODE: ${MOCK_MODE:-false}
      # TimescaleDB
      TIMESCALE_COMPRESSION_INTERVAL: ${TIMESCALE_COMPRESSION_INTERVAL:-7 days}
      # Chainlink
      CHAINLINK_API_KEY: ${CHAINLINK_API_KEY}
      CHAINLINK_ORACLE_ADDRESS: ${CHAINLINK_ORACLE_ADDRESS}
      # CBAM (regulatory limits)
      CBAM_GHG_LIMIT_TCO2_PER_TH2: ${CBAM_GHG_LIMIT_TCO2_PER_TH2:-3.4}
      CBAM_AUTHORIZATION_DEADLINE: ${CBAM_AUTHORIZATION_DEADLINE:-2026-03-31}
      CBAM_FIRST_SURRENDER_DATE: ${CBAM_FIRST_SURRENDER_DATE:-2027-09-30}
      # API
      API_KEY_HEADER: ${API_KEY_HEADER:-X-API-Key}
      # Frontend URL (used by backend for redirects/references)
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: gunicorn main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: http://backend:8000
        NEXT_PUBLIC_API_KEY: ${NEXT_PUBLIC_API_KEY}
    container_name: h2v_frontend_prod
    entrypoint: [""]
    command: ["node", "server.js"]
    environment:

      # Em produção (Docker), o backend está no serviço 'backend:8000'
      NEXT_PUBLIC_API_URL: http://backend:8000
      BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_API_KEY: ${NEXT_PUBLIC_API_KEY}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: h2v_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: h2v_prometheus_prod
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: h2v_grafana_prod
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  timescale_data_prod:
  prometheus_data:
  grafana_data: