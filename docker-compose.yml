services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: h2v_timescaledb
    environment:
      POSTGRES_USER: h2v_user
      POSTGRES_PASSWORD: h2v_password
      POSTGRES_DB: h2v_trust
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U h2v_user -d h2v_trust"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: h2v_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  hardhat:
    image: node:20-alpine
    container_name: h2v_hardhat
    working_dir: /app
    volumes:
      - ./contracts:/app
    command: sh -c "npm install && npx hardhat node --hostname 0.0.0.0"
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');const req=http.request({hostname:'127.0.0.1',port:8545,path:'/',method:'POST',headers:{'Content-Type':'application/json'}},r=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>{try{const j=JSON.parse(d);process.exit(j.result?0:1)}catch(e){process.exit(1)}})});req.on('error',()=>process.exit(1));req.end('{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: h2v_backend
    environment:
      DATABASE_URL: postgresql://h2v_user:h2v_password@timescaledb:5432/h2v_trust
      REDIS_URL: redis://redis:6379
      POLYGON_RPC_URL: http://hardhat:8545
      CONTRACT_ADDRESS: 0x0165878A594ca255338adfa4d48449f69242Eb8F
      BATCH_REGISTRY_ADDRESS: 0xCf7Ed3AccA5a467e9e704C703E8D87F634fB0Fc9
      COMPLIANCE_VERIFIER_ADDRESS: 0xDc64a140Aa3E981100a9becA4E685f962f0cF6C9
      DELEGATION_MANAGER_ADDRESS: 0x5FC8d32690cc91D4c39d9d3abcBD16989F875707
      GREEN_HYDROGEN_SBT_ADDRESS: 0x0165878A594ca255338adfa4d48449f69242Eb8F
      PRIVATE_KEY: ${PRIVATE_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}
      MOCK_MODE: false
      SECRET_KEY: ${SECRET_KEY:-test-secret-key-for-local-development-12345}
    ports:
      - "8000:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      hardhat:
        condition: service_healthy

    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: h2v_frontend
    env_file:
      - ./frontend/.env.local

    ports:
      - "3000:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');const req=http.get('http://localhost:3000',r=>{process.exit(r.statusCode===200?0:1)});req.on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  timescale_data: