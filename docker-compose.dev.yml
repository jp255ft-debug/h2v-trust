# ============================================================
# H2V-Trust - Docker Compose Override para Desenvolvimento
# ============================================================
# Uso: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --remove-orphans
# Este arquivo contém APENAS as diferenças para desenvolvimento.
# Ele é mesclado com o docker-compose.yml base.
# ============================================================

services:
  backend:
    command: uvicorn main:app --reload --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
      - /app/__pycache__
    environment:
      - PYTHONUNBUFFERED=1
    develop:

      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - __pycache__/
            - .venv/
            - .env
            - alembic/
        - action: rebuild
          path: ./backend/requirements.txt
        - action: rebuild
          path: ./backend/requirements.prod.txt

  frontend:
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src
        - action: sync
          path: ./frontend/app
          target: /app/app
        - action: sync
          path: ./frontend/public
          target: /app/public
        - action: rebuild
          path: ./frontend/package.json

